[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
# Markers; if using --strict-markers in CI, ensure they are registered (e.g. in conftest).
markers =
    unit: Unit tests (fast, no I/O).
    integration: Integration tests (HTTP server, real requests).
    e2e: End-to-end tests (subprocess, full flow).
